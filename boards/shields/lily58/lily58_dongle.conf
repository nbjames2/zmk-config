# Disable ZMK Studio on dongle - not needed since dongle has no keys
CONFIG_ZMK_STUDIO=n

# Disable display on dongle - dongle has no display
CONFIG_ZMK_DISPLAY=n

# Bluetooth settings for dongle
# Dongle needs to connect to both keyboard halves
CONFIG_ZMK_BLE=y
CONFIG_BT_MAX_CONN=5
CONFIG_BT_MAX_PAIRED=5
CONFIG_ZMK_BLE_EXPERIMENTAL_FEATURES=y
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
