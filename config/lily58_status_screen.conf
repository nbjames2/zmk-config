// Custom status screen configuration for lily58
// This allows different displays on left (dog + layers) vs right (battery)

#include <dt-bindings/zmk/widgets.h>

/ {
    chosen {
        zmk,status-screen = &status_screen;
    };

    status_screen: status_screen {
        compatible = "zmk,status-screen";

        // Left side: show layer status with animation
        #if IS_LEFT_SIDE
        widgets = <&layer_status &wpm_status>;
        #else
        // Right side: show battery and output status
        widgets = <&battery_status &output_status>;
        #endif
    };
};
